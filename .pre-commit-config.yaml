repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --config=server/pyproject.toml]
        files: ^server/
      - id: ruff-format
        args: [--config=server/pyproject.toml]
        files: ^server/

  # Note: mypy and pytest are run in CI/CD pipeline
  # To run locally: cd server && uv run mypy . && uv run pytest ../tests/ -q
